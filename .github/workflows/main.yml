name: Main

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 */1 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Checkout Repo
        uses: actions/checkout@v4
      
      - name: Run Script
        run: node index.js
        env:
          API_KEY: ${{secrets.API_KEY}}
          WEBHOOK_URL: ${{secrets.WEBHOOK_URL}}
